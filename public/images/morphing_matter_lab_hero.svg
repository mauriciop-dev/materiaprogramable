<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1128"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="200" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="300" cy="200" r="100" fill="#06b6d4" opacity="0.1"/>
  <circle cx="900" cy="400" r="150" fill="#8b5cf6" opacity="0.08"/>
  <g fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4">
    <circle cx="500" cy="280" r="60">
      <animate attributeName="r" values="60;70;60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="350" r="40">
      <animate attributeName="r" values="40;50;40" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="400" r="25">
      <animate attributeName="r" values="25;35;25" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5">
    <circle cx="400" cy="320" r="30">
      <animate attributeName="r" values="30;40;30" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="280" r="35">
      <animate attributeName="r" values="35;45;35" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>