<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1128"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="200" fill="#8b5cf6" opacity="0.1"/>
  <g fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5">
    <circle cx="550" cy="280" r="50">
      <animate attributeName="r" values="50;60;50" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.4">
    <circle cx="650" cy="350" r="35">
      <animate attributeName="r" values="35;45;35" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <rect x="450" y="400" width="300" height="30" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3" rx="15"/>
</svg>