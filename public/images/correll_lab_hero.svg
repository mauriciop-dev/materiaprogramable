    <animate attributeName="x" values="300;310;300" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="700" y="200" width="200" height="230" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.4" rx="15">
    <animate attributeName="x" values="700;690;700" dur="2s" repeatCount="indefinite"/>
  </rect>
  <circle cx="600" cy="315" r="40" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.6">
